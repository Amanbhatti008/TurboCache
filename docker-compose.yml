version: '3.8'

services:
  mimir-node-1:
    build: ./cpp-cache-engine
    ports:
      - "8081:8080"
    
  mimir-node-2:
    build: ./cpp-cache-engine
    ports:
      - "8082:8080"

  mimir-node-3:
    build: ./cpp-cache-engine
    ports:
      - "8083:8080"

  nginx-lb:
    image: nginx:latest
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - mimir-node-1
      - mimir-node-2
      - mimir-node-3

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
